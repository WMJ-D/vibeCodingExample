<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #303133;
    }
    h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #409eff;
    }
    .info {
      padding: 10px;
      background: #f5f7fa;
      border-radius: 6px;
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .info strong { color: #409eff; }
    button {
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      background: #409eff;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #337ecc; }
    button:disabled { background: #c0c4cc; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #909399;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>书签 &amp; 标签页助手</h2>
  <div class="info">
    扩展已安装并运行。<br />
    打开 <strong>localhost</strong> 上的管理后台页面，书签和标签页数据将自动注入。
  </div>
  <button id="btn-send">手动推送到当前页面</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
